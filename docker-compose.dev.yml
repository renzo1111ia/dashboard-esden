# ============================================================
# Docker Compose — Desarrollo Local (SOLO Redis)
# 
# Uso:
#   docker-compose -f docker-compose.dev.yml up -d
#   docker-compose -f docker-compose.dev.yml down
#
# Esto levanta únicamente Redis para que BullMQ funcione
# mientras corres el dashboard con: npm run dev
# ============================================================

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: esden-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - "com.esden.service=redis-dev"
      - "com.esden.environment=development"

volumes:
  redis_dev_data:
    driver: local
